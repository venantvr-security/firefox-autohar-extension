<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 16px;
      min-width: 320px;
      margin: 0;
    }

    h2 {
      font-size: 16px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #0d6efd, #198754);
      border-radius: 4px;
    }

    .status-box {
      background: #2d2d2d;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      color: #a0a0a0;
      font-weight: 500;
    }

    .status-value {
      font-weight: 600;
      font-family: 'Courier New', monospace;
      color: #0d6efd;
    }

    .status-value.recording {
      color: #dc3545;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .progress-container {
      margin-bottom: 12px;
    }

    .progress-label {
      color: #a0a0a0;
      font-size: 11px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar {
      background: #3d3d3d;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      background: linear-gradient(90deg, #198754, #0d6efd);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-fill.warning {
      background: linear-gradient(90deg, #ffc107, #ff9800);
    }

    .progress-fill.danger {
      background: linear-gradient(90deg, #dc3545, #c82333);
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: #198754;
    }

    .btn-start:hover:not(:disabled) {
      background: #157347;
    }

    .btn-stop {
      background: #dc3545;
    }

    .btn-stop:hover:not(:disabled) {
      background: #bb2d3b;
    }

    .btn-secondary {
      background: #6c757d;
      flex: 0.5;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #5c636a;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .saved-files {
      background: #2d2d2d;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
      max-height: 100px;
      overflow-y: auto;
      font-size: 11px;
    }

    .saved-files-title {
      color: #a0a0a0;
      font-weight: 500;
      margin-bottom: 6px;
      font-size: 10px;
      text-transform: uppercase;
    }

    .saved-file-item {
      background: #1e1e1e;
      padding: 6px;
      border-radius: 3px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .saved-file-name {
      color: #0d6efd;
      word-break: break-all;
      flex: 1;
    }

    .saved-file-size {
      color: #a0a0a0;
      font-size: 10px;
      white-space: nowrap;
      margin-left: 8px;
    }

    .badges {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .badge {
      background: #3d3d3d;
      color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 500;
    }

    .badge.active {
      background: #198754;
      color: white;
    }

    .private-mode {
      margin-top: 8px;
      padding: 8px;
      background: #2d4a3e;
      border-radius: 4px;
      font-size: 11px;
      color: #198754;
    }
  </style>
</head>
<body>
  <h2>
    <div class="logo"></div>
    PentestHAR
  </h2>

  <div class="status-box">
    <div class="status-row">
      <span class="status-label">Status</span>
      <span class="status-value" id="statusValue">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">Requêtes</span>
      <span class="status-value" id="requestCount">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">Taille</span>
      <span class="status-value" id="totalSize">0.00 MB</span>
    </div>
    <div class="status-row">
      <span class="status-label">Fichiers</span>
      <span class="status-value" id="fileCount">0</span>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-label">
      <span>Progression</span>
      <span id="progressText">0 / 5 MB</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="button-group">
    <button class="btn btn-start" id="startBtn">▶ Start</button>
    <button class="btn btn-stop" id="stopBtn" disabled>■ Stop</button>
    <button class="btn btn-secondary" id="settingsBtn" title="Paramètres">⚙</button>
  </div>

  <div class="saved-files" id="savedFiles" style="display: none;">
    <div class="saved-files-title">Derniers fichiers</div>
    <div id="filesList"></div>
  </div>

  <div class="badges">
    <span class="badge active">v2.0</span>
    <span class="badge">MV2</span>
  </div>

  <div class="private-mode">
    ✓ Mode navigation privée supporté
  </div>

  <script src="popup.js"></script>
</body>
</html>
